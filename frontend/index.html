<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free AI football predictions across 90 competitions. Premier League, Champions League, La Liga, Serie A, FIFA World Cup Qualifiers, Copa Libertadores, MLS & more. Win probabilities and predicted scores updated daily." />
  <meta name="keywords"
    content="football predictions, AI football predictions, soccer predictions, Premier League predictions, Champions League predictions, FIFA World Cup predictions, Copa Libertadores predictions, match predictions, betting tips, predicted score" />
  <meta name="theme-color" content="#06b6d4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FixtureCast" />

  <!-- Performance: DNS Prefetch & Preconnect for external resources -->
  <link rel="dns-prefetch" href="https://api.fixturecast.com" />
  <link rel="dns-prefetch" href="https://media.api-sports.io" />
  <link rel="dns-prefetch" href="https://ai-assistant-cloudflare.btltech.workers.dev" />
  <link rel="preconnect" href="https://api.fixturecast.com" crossorigin />
  <link rel="preconnect" href="https://media.api-sports.io" crossorigin />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="FixtureCast - AI Football Predictions" />
  <meta property="og:description" content="AI-powered football match predictions using proprietary AI" />
  <meta property="og:url" content="https://fixturecast.com" />
  <meta property="og:image" content="https://fixturecast.com/default-og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="FixtureCast" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@fixturecast" />
  <meta name="twitter:image" content="https://fixturecast.com/default-og.png" />

  <title>FixtureCast - AI Football Predictions</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>

  <!-- AI Chat Widget -->
  <script src="https://ai-assistant-widgets.pages.dev/fixturecast-widget.js"></script>

  <!-- Register Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed'));
      });
    }
  </script>
</body>

</html>
