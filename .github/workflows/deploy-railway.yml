name: Deploy App Services

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Exact Railway service name to deploy (for example: backend-api, telegram-bot, discord-bot, scheduler)'
        required: true
        default: 'backend-api'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Backend import smoke test
        working-directory: backend
        run: |
          python -c "import main; print('main imports OK')"
          python -c "import database; print('database imports OK')"
          python -c "import api_client; print('api_client imports OK')"

      - name: Bot and scheduler syntax check
        run: |
          python -m py_compile scripts/telegram_bot.py
          python -m py_compile scripts/discord_bot.py
          python -m py_compile scripts/scheduled_tasks.py

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://raw.githubusercontent.com/railwayapp/cli/master/install.sh | sh

      - name: Link Railway project
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway link -p "$RAILWAY_PROJECT_ID" -e production

      - name: Deploy selected service
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          echo "🚀 Deploying $SERVICE..."
          railway up --service "$SERVICE" -d
