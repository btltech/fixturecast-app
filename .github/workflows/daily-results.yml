# GitHub Actions Workflow for Daily Results Collection
# Collects finished match results and updates prediction accuracy metrics

name: Daily Results Collection

on:
  schedule:
    # Run at 11:00 PM UTC daily (after most matches finish, including extra time)
    - cron: '0 23 * * *'
    # Also run at 6:00 AM UTC (for late night matches)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

env:
  ML_API_URL: https://ml-api-production-6cfc.up.railway.app
  BACKEND_API_URL: https://backend-api-production-7b7d.up.railway.app

jobs:
  collect-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests python-dateutil

      - name: Collect Daily Results
        run: |
          echo "📊 Collecting results for finished matches..."

          python << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime, timedelta
          from dateutil import parser
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          ML_API_URL = os.environ.get("ML_API_URL", "https://ml-api-production-6cfc.up.railway.app")
          BACKEND_API_URL = os.environ.get("BACKEND_API_URL", "https://backend-api-production-7b7d.up.railway.app")

          def build_session():
              retry = Retry(
                  total=3,
                  backoff_factor=1,
                  status_forcelist=[429, 500, 502, 503, 504],
                  allowed_methods=["GET", "POST"],
              )
              adapter = HTTPAdapter(max_retries=retry)
              session = requests.Session()
              session.mount("https://", adapter)
              session.mount("http://", adapter)
              return session

          # All supported leagues (same as frontend)
          LEAGUES = [
              # Tier 1 - Top Leagues
              39,   # Premier League (England)
              140,  # La Liga (Spain)
              135,  # Serie A (Italy)
              78,   # Bundesliga (Germany)
              61,   # Ligue 1 (France)
              88,   # Eredivisie (Netherlands)
              94,   # Primeira Liga (Portugal)
              307,  # Saudi Pro League
              71,   # Brasileirão (Brazil)
              203,  # Süper Lig (Turkey)
              253,  # MLS (USA)
              179,  # Scottish Premiership
              144,  # Belgian Pro League
              # Tier 2 - Championship Leagues
              40,   # Championship (England)
              141,  # Segunda División (Spain)
              136,  # Serie B (Italy)
              79,   # 2. Bundesliga (Germany)
              62,   # Ligue 2 (France)
              # European Competitions
              2,    # Champions League
              3,    # Europa League
              848,  # Conference League
              # Domestic Cups
              45,   # FA Cup (England)
              48,   # League Cup (England)
          ]

          def collect_results():
              """Collect finished match results for the last 3 days."""
              today = datetime.now()
              results = {"collected": 0, "failed": 0, "recorded": 0, "matches": [], "result_records": []}
              session = build_session()

              for days_ago in range(3):
                  date = (today - timedelta(days=days_ago)).strftime("%Y-%m-%d")
                  print(f"\n📅 Processing {date}...")

                  for league_id in LEAGUES:
                      try:
                          # Fetch fixtures from Backend API (correct endpoint format)
                          resp = session.get(
                              f"{BACKEND_API_URL}/api/fixtures",
                              params={"league": league_id, "date": date},
                              timeout=30
                          )
                          if resp.status_code != 200:
                              print(f"  ⚠️ League {league_id} returned {resp.status_code}")
                              continue

                          data = resp.json()
                          fixtures = data.get("response", [])

                          for fixture in fixtures:
                              status = fixture.get("fixture", {}).get("status", {}).get("short", "")
                              if status not in ["FT", "AET", "PEN"]:
                                  continue  # Only finished matches

                              fixture_id = fixture.get("fixture", {}).get("id")
                              home_team = fixture.get("teams", {}).get("home", {}).get("name", "Unknown")
                              away_team = fixture.get("teams", {}).get("away", {}).get("name", "Unknown")
                              home_goals = fixture.get("goals", {}).get("home", 0) or 0
                              away_goals = fixture.get("goals", {}).get("away", 0) or 0

                              # First get prediction to ensure it exists
                              try:
                                  pred_resp = session.get(
                                      f"{ML_API_URL}/api/prediction/{fixture_id}",
                                      params={"league": league_id},
                                      timeout=120
                                  )
                                  if pred_resp.status_code == 200:
                                      results["collected"] += 1
                                      results["matches"].append({
                                          "fixture_id": fixture_id,
                                          "match": f"{home_team} vs {away_team}",
                                          "score": f"{home_goals}-{away_goals}",
                                          "date": date
                                      })
                                      # Add to bulk record
                                      results["result_records"].append({
                                          "fixture_id": fixture_id,
                                          "home_goals": home_goals,
                                          "away_goals": away_goals,
                                          "status": status
                                      })
                                      print(f"  ✅ {home_team} {home_goals}-{away_goals} {away_team}")
                                  else:
                                      results["failed"] += 1
                                      print(f"  ❌ Failed: {home_team} vs {away_team}")
                              except Exception as e:
                                  results["failed"] += 1
                                  print(f"  ❌ Error: {home_team} vs {away_team}: {e}")

                      except Exception as e:
                          print(f"  ⚠️ League {league_id} error: {e}")
                          continue

              # Submit all results to metrics API in bulk
              if results["result_records"]:
                  print(f"\n📤 Recording {len(results['result_records'])} results to metrics API...")
                  try:
                      record_resp = session.post(
                          f"{ML_API_URL}/api/metrics/record-results-bulk",
                          json={"results": results["result_records"]},
                          timeout=120
                      )
                      if record_resp.status_code == 200:
                          record_data = record_resp.json()
                          results["recorded"] = record_data.get("recorded", len(results["result_records"]))
                          print(f"  ✅ Successfully recorded {results['recorded']} results")
                      else:
                          print(f"  ⚠️ Bulk record returned {record_resp.status_code}: {record_resp.text[:200]}")
                  except Exception as e:
                      print(f"  ❌ Bulk record error: {e}")

              return results

          if __name__ == "__main__":
              print("🏟️ Daily Results Collection Starting...")
              results = collect_results()
              print(f"\n📊 Summary:")
              print(f"  ✅ Collected: {results['collected']}")
              print(f"  📊 Recorded: {results['recorded']}")
              print(f"  ❌ Failed: {results['failed']}")

              # Write summary (remove result_records to keep file small)
              summary = {k: v for k, v in results.items() if k != "result_records"}
              with open("results_summary.json", "w") as f:
                  json.dump(summary, f, indent=2)
          EOF

      - name: Update Accumulator Results
        run: |
          echo "🎲 Updating accumulator results..."

          python << 'EOF'
          import os
          import requests

          BACKEND_API_URL = os.environ.get("BACKEND_API_URL", "https://backend-api-production-7b7d.up.railway.app")

          try:
              print("Calling accumulator results update endpoint...")
              response = requests.post(
                  f"{BACKEND_API_URL}/api/accumulators/update-results",
                  timeout=60
              )

              if response.status_code == 200:
                  data = response.json()
                  print(f"✅ Successfully updated {data.get('checked', 0)} accumulators")
                  print(f"   Settled: {data.get('message', 'N/A')}")
              else:
                  print(f"⚠️ Update returned {response.status_code}: {response.text[:200]}")
          except Exception as e:
              print(f"❌ Error updating accumulator results: {e}")
          EOF

      - name: Upload Results Summary
        uses: actions/upload-artifact@v4
        with:
          name: daily-results-${{ github.run_id }}
          path: results_summary.json
          retention-days: 30

      - name: Generate Summary
        run: |
          echo "## 📊 Daily Results Collection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f results_summary.json ]; then
            COLLECTED=$(cat results_summary.json | jq '.collected')
            FAILED=$(cat results_summary.json | jq '.failed')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Collected | $COLLECTED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Daily results collection workflow failed!"
          echo "## ⚠️ Workflow Failure Alert" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The daily results collection workflow encountered an error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** Daily Results Collection" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
